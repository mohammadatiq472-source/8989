name: dual-machine-pr-gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]
  workflow_dispatch:
    inputs:
      prNumber:
        description: "Manual PR number to validate when pull_request trigger is missing."
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  dual-machine-review-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate dual-machine checklist and approvals
        uses: actions/github-script@v7
        with:
          script: |
            const dualMaintainers = [
              "mohammadatiq472-source",
              "rltsgxol4437"
            ];

            const manualPrNumberInput = core.getInput("prNumber");
            const manualPrNumber = manualPrNumberInput ? Number(manualPrNumberInput) : undefined;
            if (manualPrNumberInput && !Number.isInteger(manualPrNumber)) {
              core.setFailed(`Invalid prNumber input: ${manualPrNumberInput}`);
              return;
            }

            const resolvedPrNumber = manualPrNumber || context.issue.number;
            const pr = context.payload.pull_request || (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: resolvedPrNumber
            })).data;

            if (pr.draft) {
              core.setFailed("PR is still draft. Mark ready for review first.");
              return;
            }

            const body = pr.body || "";
            const requiredCheckedBoxes = [
              /- \[x\]\s*`?A-main`?.*/i,
              /- \[x\]\s*`?B-main`?.*/i,
              /- \[x\].*企业微信.*/i,
              /- \[x\].*回滚方案.*/i,
              /- \[x\].*本地验证命令.*/i,
              /- \[x\].*CI.*/i
            ];

            const missing = requiredCheckedBoxes
              .map((expr, index) => ({ expr, index }))
              .filter(({ expr }) => !expr.test(body))
              .map(({ index }) => index + 1);
            if (missing.length > 0) {
              core.setFailed(`PR 模板勾选项不完整，缺少第 ${missing.join(", ")} 个必填勾选项。`);
              return;
            }

            const author = pr.user?.login || "";
            if (!dualMaintainers.includes(author)) {
              core.setFailed(`PR 作者必须是双机主账号之一，当前作者: ${author || "unknown"}`);
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              if (!review.user || !review.user.login) continue;
              latestByUser.set(review.user.login, review.state);
            }

            const approvals = [...latestByUser.entries()]
              .filter(([, state]) => state === "APPROVED")
              .map(([login]) => login);

            const dualApprovals = approvals.filter((login) => dualMaintainers.includes(login));
            const counterpartApprovals = dualApprovals.filter((login) => login !== author);

            if (counterpartApprovals.length < 1) {
              core.setFailed(
                `需要来自另一台机器主账号的 APPROVED。当前作者: ${author}; 已有审批: ${dualApprovals.join(", ") || "none"}`
              );
              return;
            }

            core.info(
              `Dual-machine gate passed. author=${author}; counterpartApproval=${counterpartApprovals.join(", ")}`
            );
