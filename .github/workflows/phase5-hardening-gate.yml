name: phase5-hardening-gate

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  hardening-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unity contract sync gate
        run: npm run gate:contracts:unity

      - name: Phase5 hardening gate
        run: npm run gate:phase5:hardening

  unity-quota-e2e-baseline:
    needs: hardening-gate
    if: ${{ vars.UNITY_E2E_ENABLED == '1' && vars.UNITY_EXE != '' }}
    runs-on: ${{ vars.UNITY_E2E_RUNNER != '' && vars.UNITY_E2E_RUNNER || 'windows-latest' }}
    timeout-minutes: 30
    env:
      UNITY_EXE: ${{ vars.UNITY_EXE }}
      UNITY_PROJECT_PATH: My project
      UNITY_E2E_METHOD: SLGCommander.EditorDiagnostics.AiQuotaRealtimeHudE2EValidator.RunBatch
      UNITY_E2E_PASS_KEYWORD: "[AiQuotaRealtimeHudE2EValidator] PASS end-to-end: subscribed -> diagnostic emitted -> HUD updated -> screenshot captured"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare output directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "tmp/unity" | Out-Null

      - name: CI pre-clean scene backups
        shell: pwsh
        run: |
          if (Test-Path "My project/Temp/__Backupscenes") {
            Remove-Item -Recurse -Force "My project/Temp/__Backupscenes"
          }
          if (Test-Path "My project/Assets/_Recovery") {
            Remove-Item -Recurse -Force "My project/Assets/_Recovery"
          }

      - name: Run Unity batch E2E validation
        id: unity_batch
        shell: pwsh
        run: |
          $projectPath = Join-Path $PWD $env:UNITY_PROJECT_PATH
          $logPath = Join-Path $PWD "tmp/unity/e2e-runbatch.log"
          & "$env:UNITY_EXE" -batchmode -projectPath "$projectPath" -executeMethod "$env:UNITY_E2E_METHOD" -logFile "$logPath"
          $exitCode = $LASTEXITCODE
          "exit_code=$exitCode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          exit 0

      - name: Verify PASS keyword and screenshot artifact
        shell: pwsh
        env:
          UNITY_BATCH_EXIT_CODE: ${{ steps.unity_batch.outputs.exit_code }}
        run: |
          if ("$env:UNITY_BATCH_EXIT_CODE" -ne "0") {
            throw "Unity batch returned non-zero exit code: $env:UNITY_BATCH_EXIT_CODE"
          }

          $logPath = Join-Path $PWD "tmp/unity/e2e-runbatch.log"
          if (-not (Test-Path $logPath)) {
            throw "Missing Unity batch log: $logPath"
          }

          $logContent = Get-Content -LiteralPath $logPath -Raw -Encoding utf8
          $passKeyword = $env:UNITY_E2E_PASS_KEYWORD
          if ($logContent -notmatch [regex]::Escape($passKeyword)) {
            throw "PASS keyword not found in Unity batch log."
          }

          $screenshots = Get-ChildItem -Path "tmp/unity" -Filter "youzhou-map-*.png" -File -ErrorAction SilentlyContinue
          if (-not $screenshots) {
            throw "Screenshot artifact not found: tmp/unity/youzhou-map-*.png"
          }

      - name: Upload Unity E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-ai-quota-e2e
          path: |
            tmp/unity/e2e-runbatch.log
            tmp/unity/youzhou-map-*.png
